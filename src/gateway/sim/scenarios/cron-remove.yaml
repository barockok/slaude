layer: dm
as: manager
steps:
  - send: { text: '/cron-add "0 9 * * 1" "standup summary"' }
  - expect_reply: { contains: "cron job created" }
  - send: { text: "/cron-list" }
  - expect_reply: { contains: "Active cron jobs" }
  - send: { text: "/cron-remove fake-id-00" }
  - expect_reply: { contains: "cron job" }
