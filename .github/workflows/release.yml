name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    name: GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        # bun 1.3.11 exits 99 for this suite even when every test passes — a
        # runner-internal quirk unrelated to coverage (see ci.yml + PR #22).
        # Gate on the parsed failure count, not bun's raw exit code, so a clean
        # run can't abort the release. Any exit other than 0/99 is a real crash.
        run: |
          set +e
          bun test --coverage 2>&1 | tee test-output.txt
          code=${PIPESTATUS[0]}
          set -e
          fails=$(grep -oE '^[[:space:]]*[0-9]+ fail' test-output.txt | grep -oE '[0-9]+' | tail -1)
          fails=${fails:-0}
          echo "bun exit code: ${code}; parsed test failures: ${fails}"
          if [ "${fails}" -ne 0 ]; then
            echo "::error::${fails} test(s) failed"; exit 1
          fi
          if [ "${code}" -ne 0 ] && [ "${code}" -ne 99 ]; then
            echo "::error::bun exited ${code} (not 0/99) — treating as a crash"; exit "${code}"
          fi
          echo "tests passed (${fails} failures; bun exit ${code} tolerated)"

      - name: Generate changelog
        id: changelog
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          NOTES_FILE="docs/releases/${REF_NAME}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "Using hand-written notes from $NOTES_FILE"
            cp "$NOTES_FILE" CHANGELOG.md
          else
            PREV=$(git tag --sort=-v:refname | grep -v "^${REF_NAME}$" | head -n1 || true)
            {
              echo "## What changed"
              echo
              if [ -n "$PREV" ]; then
                git log --pretty=tformat:'- %s (%h)' "${PREV}..${REF_NAME}"
                echo
                echo "**Full diff:** https://github.com/${REPO}/compare/${PREV}...${REF_NAME}"
              else
                git log --pretty=tformat:'- %s (%h)' "${REF_NAME}"
              fi
            } > CHANGELOG.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
