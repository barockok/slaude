name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    name: GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun test --coverage

      - name: Generate changelog
        id: changelog
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          PREV=$(git tag --sort=-v:refname | grep -v "^${REF_NAME}$" | head -n1 || true)
          {
            echo "## What changed"
            echo
            if [ -n "$PREV" ]; then
              git log --pretty=format:'- %s (%h)' "${PREV}..${REF_NAME}"
              echo
              echo
              echo "**Full diff:** https://github.com/${{ github.repository }}/compare/${PREV}...${REF_NAME}"
            else
              git log --pretty=format:'- %s (%h)' "${REF_NAME}"
            fi
          } > CHANGELOG.md
          {
            echo 'changelog<<__END__'
            cat CHANGELOG.md
            echo '__END__'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
