name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: typecheck + tests + coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests with coverage
        # bun 1.3.11 exits 99 for this suite even when every test passes — a
        # runner-internal quirk unrelated to coverage (reproduces with coverage
        # fully disabled; no test fails, no rejection surfaces). So we gate on the
        # parsed failure count, not bun's raw exit code. Coverage itself is gated
        # by Codecov (project + patch) on the lcov.info produced here. Any exit
        # other than 0 or 99 is a real crash and still fails the job.
        run: |
          set +e
          bun test --coverage 2>&1 | tee test-output.txt
          code=${PIPESTATUS[0]}
          set -e
          fails=$(grep -oE '^[[:space:]]*[0-9]+ fail' test-output.txt | grep -oE '[0-9]+' | tail -1)
          fails=${fails:-0}
          echo "bun exit code: ${code}; parsed test failures: ${fails}"
          if [ "${fails}" -ne 0 ]; then
            echo "::error::${fails} test(s) failed"; exit 1
          fi
          if [ "${code}" -ne 0 ] && [ "${code}" -ne 99 ]; then
            echo "::error::bun exited ${code} (not 0/99) — treating as a crash"; exit "${code}"
          fi
          echo "tests passed (${fails} failures; bun exit ${code} tolerated)"

      - name: Upload coverage report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  installer:
    name: installer shellcheck + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck && shellcheck install.sh scripts/package-release.sh tests/installer/smoke.sh
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.11 }
      - run: bun install --frozen-lockfile
      - name: install smoke test
        run: bash tests/installer/smoke.sh
