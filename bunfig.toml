[test]
preload = ["./tests/setup.ts"]
coverage = true
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
coverageSkipTestFiles = true

# Coverage is gated by Codecov (project + patch) in CI — see .github/workflows/ci.yml.
# These local thresholds are a dev-side signal only. `statement` is intentionally
# omitted: bun 1.3.11 (CI) counts statement coverage on async-timing-sensitive
# boot paths stricter than newer local bun, so it flapped just under 0.97 and made
# bun exit 100 (which the CI wrapper treats as a crash) even with line coverage at
# 98%+. line + function stay enforced; Codecov remains the real coverage gate.
[test.coverageThreshold]
line = 0.97
function = 0.80
