[test]
preload = ["./tests/setup.ts"]
coverage = true
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
coverageSkipTestFiles = true
# Platform navigators are live-UI scraping (Meet/Jitsi join flows) — verified
# in field tests, not unit-testable without a real browser + call. Their pure
# matches() logic is covered via resolveNavigator tests before exclusion.
coveragePathIgnorePatterns = [
  "src/voice/navigators/meet.ts",
  "src/voice/navigators/jitsi.ts",
]

[test.coverageThreshold]
line = 0.97
function = 0.80
statement = 0.97
